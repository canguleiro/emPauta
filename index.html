<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Pauta - PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Fundo externo (visível apenas no PC) */
        body { 
            background-color: #d1d7db; 
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Contentor principal que limita a largura */
        .main-app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #efeae2;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }

        /* Área de Mensagens */
        .chat-area { 
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth; 
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .bubble { max-width: 85%; border-radius: 12px; position: relative; animation: fadeIn 0.2s ease; cursor: pointer; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .my-msg { background-color: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .other-msg { background-color: #ffffff; align-self: flex-start; border-top-left-radius: 2px; }
        
        .reply-tag { border-left: 3px solid #075e54; background: rgba(0,0,0,0.05); padding: 5px; margin-bottom: 5px; font-size: 0.8rem; color: #666; font-style: italic; border-radius: 4px; }
        
        /* Tela de Login adaptada ao contentor */
        #login-screen { 
            position: absolute;
            inset: 0;
            z-index: 50;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%); 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: opacity 0.5s ease;
        }
        
        .hidden { display: none !important; }
        .error-overlay { background: rgba(220, 38, 38, 0.9); color: white; padding: 10px; text-align: center; font-size: 12px; z-index: 100; position: absolute; top: 0; width: 100%; }
    </style>
</head>
<body>

    <div class="main-app-container">
        <!-- Notificação de Erro -->
        <div id="error-msg" class="error-overlay hidden">
            <i class="fas fa-exclamation-triangle mr-2"></i> <span id="error-text">Erro de ligação</span>
        </div>

        <!-- Tela de Login -->
        <div id="login-screen">
            <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                <h1 class="text-3xl font-bold text-teal-800 mb-1">Em Pauta</h1>
                <p class="text-gray-400 text-sm mb-6">Comunicação Instantânea</p>
                
                <input type="password" id="pass-input" placeholder="Senha de Acesso" 
                       class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center text-xl focus:ring-2 ring-teal-500 outline-none transition-all">
                
                <input type="text" id="nick-input" placeholder="Seu Apelido" 
                       class="w-full p-4 bg-gray-100 rounded-xl mb-6 text-center focus:ring-2 ring-teal-500 outline-none transition-all">
                
                <button onclick="attemptLogin()" class="w-full bg-teal-700 hover:bg-teal-900 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                    ENTRAR NO CHAT
                </button>
                <p id="status-text" class="text-[10px] mt-4 text-gray-400 italic">A verificar base de dados...</p>
            </div>
        </div>

        <!-- Interface do Chat -->
        <div id="chat-app" class="hidden flex flex-col h-full">
            <header class="bg-[#075e54] text-white p-4 flex justify-between items-center shadow-lg shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-comments text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold leading-none">Em Pauta</h1>
                        <span id="display-nick" class="text-[10px] text-teal-200 uppercase tracking-widest"></span>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="clearScreen()" title="Limpar Minha Tela" class="p-2 hover:bg-teal-700 rounded-full transition"><i class="fas fa-broom"></i></button>
                    <button onclick="logout()" title="Sair" class="p-2 hover:bg-teal-700 rounded-full transition"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <main id="chat-box" class="chat-area">
                <div class="text-center text-gray-400 text-[10px] my-4 uppercase tracking-widest">
                    <i class="fas fa-lock mr-1"></i> Mensagens encriptadas
                </div>
            </main>

            <footer class="bg-[#f0f0f0] shrink-0 border-t border-gray-200">
                <div id="reply-bar" class="hidden bg-gray-200 p-2 border-l-4 border-teal-700 mx-4 mt-2 rounded-lg flex justify-between items-center">
                    <div class="px-2 overflow-hidden">
                        <p class="text-[9px] font-bold text-teal-700 uppercase">A responder a</p>
                        <p id="reply-preview-text" class="text-xs text-gray-600 truncate italic"></p>
                    </div>
                    <button onclick="cancelReply()" class="text-red-500 p-2 font-bold text-xl">&times;</button>
                </div>

                <div class="p-4 flex items-end gap-3">
                    <div class="flex-1 bg-white rounded-2xl shadow-sm p-1 flex flex-col border border-gray-300">
                        <textarea id="msg-input" placeholder="Escreva uma mensagem..." rows="1"
                                  class="w-full p-3 outline-none resize-none max-h-32 text-sm bg-transparent"></textarea>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="toggleEmojis()" class="w-10 h-10 bg-white text-gray-500 rounded-full shadow hover:text-teal-600 transition flex items-center justify-center">
                            <i class="far fa-smile text-xl"></i>
                        </button>
                        <button id="send-btn" onclick="doSendMessage()" class="w-12 h-12 bg-[#00a884] text-white rounded-full shadow-xl hover:bg-[#008f72] flex items-center justify-center transition-transform active:scale-90">
                            <i class="fas fa-paper-plane text-lg"></i>
                        </button>
                    </div>
                </div>

                <div id="emoji-box" class="hidden grid grid-cols-5 gap-2 pb-4 px-4 bg-[#f0f0f0]">
                    <button onclick="insertEmoji('😊')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">😊</button>
                    <button onclick="insertEmoji('😂')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">😂</button>
                    <button onclick="insertEmoji('😮')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">😮</button>
                    <button onclick="insertEmoji('😢')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">😢</button>
                    <button onclick="insertEmoji('❤️')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">❤️</button>
                    <button onclick="insertEmoji('👍')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">👍</button>
                    <button onclick="insertEmoji('🙏')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">🙏</button>
                    <button onclick="insertEmoji('🔥')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">🔥</button>
                    <button onclick="insertEmoji('✅')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">✅</button>
                    <button onclick="insertEmoji('⚠️')" class="text-2xl p-2 bg-white rounded-lg shadow-sm">⚠️</button>
                </div>
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASQkgnQkeKjXKrmT3yMV9zcUVxec3NvrA",
            authDomain: "em-pauta-d6e92.firebaseapp.com",
            projectId: "em-pauta-d6e92",
            storageBucket: "em-pauta-d6e92.firebasestorage.app",
            messagingSenderId: "94994518950",
            appId: "1:94994518950:web:e60bb5bc83558752f47567"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appIdSlug = "em-pauta-main"; 

        let currentUser = null;
        let myNick = localStorage.getItem('empauta_nick_v3') || "";
        let replyTarget = null;
        let allMessages = [];
        let filterIndex = 0;

        function showError(text) {
            const errDiv = document.getElementById('error-msg');
            const errText = document.getElementById('error-text');
            errText.innerText = text;
            errDiv.classList.remove('hidden');
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('status-text').innerText = "Ligado. Pode entrar.";
                if (myNick) startChatSession();
            }
        });

        signInAnonymously(auth).catch(e => {
            showError("A autenticação falhou! Ative o acesso 'Anónimo' no menu Authentication do Firebase.");
        });

        window.attemptLogin = () => {
            const pass = document.getElementById('pass-input').value;
            const nick = document.getElementById('nick-input').value.trim();
            if (pass === "2407" && nick) {
                myNick = nick;
                localStorage.setItem('empauta_nick_v3', nick);
                startChatSession();
            } else {
                alert("Senha ou apelido inválidos.");
            }
        };

        const startChatSession = () => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('display-nick').innerText = myNick;
            startListening();
        };

        const startListening = () => {
            const colRef = collection(db, 'artifacts', appIdSlug, 'public', 'data', 'messages');
            onSnapshot(colRef, (snap) => {
                const list = [];
                snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                allMessages = list.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                render();
                document.getElementById('error-msg').classList.add('hidden');
            }, (err) => {
                if (err.code === 'permission-denied') {
                    showError("Erro de Permissão! Verifique se as Regras (Rules) foram publicadas no Firestore.");
                }
            });
        };

        const render = () => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            allMessages.slice(filterIndex).forEach(m => {
                const isMe = m.sender === myNick;
                const div = document.createElement('div');
                div.className = `bubble flex flex-col ${isMe ? 'my-msg' : 'other-msg'}`;
                
                div.ondblclick = () => {
                    replyTarget = { sender: m.sender, text: m.text };
                    document.getElementById('reply-preview-text').innerText = `${m.sender}: ${m.text}`;
                    document.getElementById('reply-bar').classList.remove('hidden');
                    document.getElementById('msg-input').focus();
                };
                div.innerHTML = `
                    <span class="text-[9px] font-bold text-teal-700 uppercase mb-1">${m.sender}</span>
                    ${m.reply ? `<div class="reply-tag">${m.reply}</div>` : ""}
                    <p class="text-sm text-gray-800 break-words whitespace-pre-wrap">${m.text}</p>
                    <span class="text-[8px] text-gray-400 text-right mt-1">
                        ${m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...'}
                    </span>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        };

        window.doSendMessage = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            const payload = {
                sender: myNick,
                text: text,
                reply: replyTarget ? `${replyTarget.sender}: ${replyTarget.text}` : null,
                timestamp: serverTimestamp(),
                uid: currentUser.uid
            };
            input.value = "";
            input.style.height = "auto";
            window.cancelReply();
            try {
                const colRef = collection(db, 'artifacts', appIdSlug, 'public', 'data', 'messages');
                await addDoc(colRef, payload);
            } catch (e) { showError("Erro ao enviar! Verifique as regras de escrita."); }
        };

        window.logout = () => { localStorage.removeItem('empauta_nick_v3'); location.reload(); };
        window.clearScreen = () => { filterIndex = allMessages.length; render(); };
        window.cancelReply = () => { replyTarget = null; document.getElementById('reply-bar').classList.add('hidden'); };
        window.toggleEmojis = () => document.getElementById('emoji-box').classList.toggle('hidden');
        window.insertEmoji = (e) => { 
            const input = document.getElementById('msg-input');
            input.value += e; 
            document.getElementById('emoji-box').classList.add('hidden'); 
            input.focus(); 
        };

        document.getElementById('msg-input').addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
        });

        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.doSendMessage(); }
        });
    </script>
</body>
</html>
