<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Pauta - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --app-bg: #efeae2; --header-bg: #075e54; }
        
        body.dark { --app-bg: #0b141a; --header-bg: #202c33; background-color: #0b141a !important; }
        
        body { 
            background-color: #d1d7db; 
            font-family: 'Segoe UI', sans-serif; 
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        .main-app-container {
            width: 100%; 
            max-width: 500px; 
            height: 100vh;
            background-color: var(--app-bg);
            position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            display: flex; 
            flex-direction: column; 
            transition: background 0.3s ease;
        }

        @media (min-width: 768px) {
            .main-app-container {
                height: 95vh;
                border-radius: 10px;
            }
        }

        .chat-area { 
            flex: 1; overflow-y: auto; scroll-behavior: smooth; 
            padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem;
            position: relative;
        }
        
        .bubble { 
            max-width: 85%; border-radius: 12px; position: relative; 
            animation: fadeIn 0.2s ease; cursor: pointer; padding: 8px 12px; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .my-msg { background-color: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .other-msg { background-color: #ffffff; align-self: flex-start; border-top-left-radius: 2px; }
        
        body.dark .my-msg { background-color: #005c4b; color: #e9edef; }
        body.dark .other-msg { background-color: #202c33; color: #e9edef; }
        body.dark .text-gray-800 { color: #e9edef !important; }
        body.dark .text-gray-400 { color: #8696a0 !important; }

        .reply-tag { 
            border-left: 4px solid #075e54; background: rgba(0,0,0,0.06); 
            padding: 6px; margin-bottom: 6px; font-size: 0.8rem; 
            color: #555; font-style: italic; border-radius: 4px; display: block;
        }
        body.dark .reply-tag { background: rgba(255,255,255,0.05); color: #a1a1a1; }
        
        #login-screen { 
            position: absolute; inset: 0; z-index: 100;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%); 
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
            border-radius: inherit;
        }
        
        .hidden { display: none !important; }
        footer { background-color: #f0f0f0; border-top: 1px solid #e0e0e0; z-index: 10; }
        body.dark footer { background-color: #202c33; border-top: 1px solid #2f3b37; }
        body.dark textarea { background: #2a3942; color: white; }

        .msg-image { border-radius: 8px; max-width: 100%; margin-top: 5px; cursor: zoom-in; }
        .msg-audio { width: 100%; margin-top: 5px; height: 35px; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #panic-screen {
            position: absolute; inset: 0; z-index: 200;
            background: #fff; display: flex; flex-direction: column;
            font-family: 'Consolas', 'Courier New', monospace; border-radius: inherit;
        }
        .notepad-header { background: #f0f0f0; padding: 2px 10px; font-size: 12px; border-bottom: 1px solid #ccc; color: #333; display: flex; gap: 15px; }
        .notepad-title { background: #fff; padding: 4px 10px; font-size: 11px; color: #666; border-bottom: 1px solid #eee; }
        .notepad-content { flex: 1; padding: 10px; border: none; outline: none; resize: none; font-size: 14px; color: #000; }

        /* Estilos do Dropdown de Mensagem - CORRIGIDO */
        .msg-menu-btn {
            position: absolute;
            top: 2px;
            right: 4px;
            color: rgba(0,0,0,0.2);
            padding: 0 4px;
            border-radius: 4px;
            font-size: 9px;
            opacity: 0;
            transition: all 0.2s;
            z-index: 5;
        }
        .bubble:hover .msg-menu-btn { opacity: 1; }
        .msg-menu-btn:hover { color: #075e54; background: rgba(0,0,0,0.05); }
        body.dark .msg-menu-btn { color: rgba(255,255,255,0.2); }

        .msg-dropdown {
            position: absolute;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-width: 140px;
            z-index: 100;
            overflow: hidden;
            border: 1px solid #eee;
            top: 22px;
        }
        /* Alinhamentos do menu baseados no lado da mensagem */
        .menu-right { right: 0; }
        .menu-left { left: 0; }

        body.dark .msg-dropdown { background: #233138; border-color: #3b4a54; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .msg-dropdown button {
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            color: #333;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        body.dark .msg-dropdown button { color: #e9edef; }
        .msg-dropdown button:hover { background: #f5f5f5; }
        body.dark .msg-dropdown button:hover { background: #182229; }

        /* Reações */
        .reactions-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .reaction-badge {
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        body.dark .reaction-badge { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }

        .react-tray {
            display: flex;
            padding: 8px;
            gap: 10px;
            border-bottom: 1px solid #eee;
            justify-content: center;
        }
        body.dark .react-tray { border-color: #3b4a54; }
        .react-tray span { font-size: 18px; transition: transform 0.2s; cursor: pointer; }
        .react-tray span:hover { transform: scale(1.4); }

        #emoji-box { max-height: 200px; overflow-y: auto; border-top: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="main-app-container">
        <!-- Modo Pânico -->
        <div id="panic-screen" class="hidden">
            <div class="notepad-title">Sem título - Bloco de Notas</div>
            <div class="notepad-header">
                <span>Arquivo</span><span>Editar</span><span>Formatar</span><span>Exibir</span><span>Ajuda</span>
                <span onclick="togglePanicMode()" style="cursor: pointer; opacity: 0.5;"><i class="fas fa-cog"></i></span>
            </div>
            <textarea class="notepad-content" placeholder="Anotações importantes..."></textarea>
        </div>

        <!-- Login -->
        <div id="login-screen">
            <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-[340px] text-center">
                <h1 class="text-3xl font-bold text-teal-800 mb-1">Em Pauta</h1>
                <p class="text-gray-400 text-sm mb-6 uppercase tracking-widest text-[10px]">Cloud Messenger</p>
                <input type="password" id="pass-input" placeholder="Senha" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center text-xl outline-none border border-transparent focus:border-teal-500">
                <input type="text" id="nick-input" placeholder="Seu Apelido" class="w-full p-4 bg-gray-100 rounded-xl mb-6 text-center outline-none border border-transparent focus:border-teal-500">
                <button onclick="attemptLogin()" class="w-full bg-teal-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 hover:bg-teal-800">ENTRAR</button>
                <p id="status-text" class="text-[10px] mt-4 text-gray-400 italic">Conectando ao banco de dados...</p>
            </div>
        </div>

        <!-- Chat -->
        <div id="chat-app" class="hidden flex flex-col h-full">
            <header id="app-header" class="bg-[#075e54] text-white p-4 flex flex-col shadow-lg shrink-0 transition-colors duration-300">
                <div class="flex justify-between items-center w-full">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center shadow-inner">
                            <i class="fas fa-paper-plane text-white text-sm"></i>
                        </div>
                        <div>
                            <h1 class="font-bold leading-none text-md">Em Pauta</h1>
                            <span id="display-nick" class="text-[9px] text-teal-200 uppercase font-semibold"></span>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button id="notif-btn" onclick="requestNotificationPermission()" title="Ativar Notificações" class="p-2 hover:bg-black/10 rounded-full transition text-blue-300 relative">
                            <i class="fas fa-bell"></i>
                        </button>
                        <button onclick="togglePanicMode()" title="Modo Segurança" class="p-2 hover:bg-black/10 rounded-full transition text-yellow-300"><i class="fas fa-shield-alt"></i></button>
                        <button onclick="toggleDarkMode()" id="dark-btn" class="p-2 hover:bg-black/10 rounded-full transition"><i class="fas fa-moon"></i></button>
                        <button onclick="toggleSearch()" class="p-2 hover:bg-black/10 rounded-full transition"><i class="fas fa-search"></i></button>
                        <button onclick="clearScreen()" title="Limpar visualização" class="p-2 hover:bg-black/10 rounded-full transition"><i class="fas fa-broom"></i></button>
                        <button onclick="logout()" class="p-2 hover:bg-black/10 rounded-full transition text-red-300"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
                <div id="search-bar" class="hidden mt-3">
                    <input type="text" id="search-input" oninput="render()" placeholder="Filtrar mensagens..." 
                           class="w-full p-2 rounded-lg bg-black/20 border-none outline-none text-sm placeholder:text-teal-200 text-white">
                </div>
            </header>

            <main id="chat-box" class="chat-area">
            </main>

            <footer class="shrink-0">
                <div id="reply-bar" class="hidden bg-gray-200 p-2 border-l-4 border-teal-700 mx-4 mt-2 rounded-lg flex justify-between items-center animate-pulse">
                    <div class="px-2 overflow-hidden">
                        <p class="text-[9px] font-bold text-teal-700 uppercase">Respondendo a</p>
                        <p id="reply-preview-text" class="text-xs text-gray-600 truncate italic"></p>
                    </div>
                    <button onclick="cancelReply()" class="text-red-500 p-2">&times;</button>
                </div>

                <div class="p-3 flex items-end gap-2">
                    <div class="flex flex-col gap-2">
                        <input type="file" id="file-input" class="hidden" accept="image/*,audio/*" onchange="handleFileSelect(this)">
                        <button onclick="document.getElementById('file-input').click()" class="w-10 h-10 bg-white dark:bg-gray-800 text-teal-600 rounded-full shadow flex items-center justify-center hover:scale-105 transition">
                            <i class="fas fa-paperclip text-lg"></i>
                        </button>
                    </div>

                    <div class="flex-1 bg-white dark:bg-gray-700 rounded-2xl shadow-sm p-1 flex flex-col border border-gray-200 dark:border-gray-600">
                        <textarea id="msg-input" placeholder="Escreva aqui..." rows="1" class="w-full p-2 outline-none resize-none text-sm bg-transparent"></textarea>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <button onclick="toggleEmojis()" class="w-10 h-10 bg-white dark:bg-gray-800 text-gray-400 rounded-full shadow flex items-center justify-center hover:text-teal-600 transition">
                            <i class="far fa-smile text-xl"></i>
                        </button>
                        <button id="send-btn" onclick="doSendMessage()" class="w-12 h-12 bg-[#00a884] text-white rounded-full shadow-lg flex items-center justify-center transition-transform active:scale-90 hover:bg-[#008f72]">
                            <i class="fas fa-paper-plane text-lg"></i>
                        </button>
                    </div>
                </div>

                <div id="file-preview" class="hidden px-4 pb-4">
                    <div class="bg-teal-50 dark:bg-teal-900/30 p-2 rounded-lg flex items-center justify-between border border-teal-200">
                        <div class="flex items-center gap-2 text-teal-800 dark:text-teal-200">
                            <i id="file-icon" class="fas fa-file"></i>
                            <span id="file-name" class="text-xs truncate max-w-[200px] font-semibold">arquivo.ext</span>
                        </div>
                        <button onclick="clearFileSelection()" class="text-red-500"><i class="fas fa-times-circle"></i></button>
                    </div>
                </div>

                <div id="emoji-box" class="hidden grid grid-cols-6 gap-2 pb-4 px-4 bg-gray-50 dark:bg-gray-900/50">
                </div>
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASQkgnQkeKjXKrmT3yMV9zcUVxec3NvrA",
            authDomain: "em-pauta-d6e92.firebaseapp.com",
            projectId: "em-pauta-d6e92",
            storageBucket: "em-pauta-d6e92.firebasestorage.app",
            messagingSenderId: "94994518950",
            appId: "1:94994518950:web:e60bb5bc83558752f47567"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appIdSlug = "em-pauta-main"; 
        const MASTER_PASS = "2407";

        let currentUser = null;
        let myNick = localStorage.getItem('empauta_nick_vfinal') || "";
        let replyTarget = null;
        let allMessages = [];
        let filterIndex = 0;
        let selectedFileBase64 = null;
        let selectedFileType = null;
        let alertInterval = null;
        const originalTitle = "Em Pauta - Pro";

        const notificationSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3");

        const emojiList = [
            "😊", "😂", "🤣", "😍", "😒", "😭", "😱", "😴", "🤮", "😎", 
            "🤔", "🤨", "🙄", "🤫", "🤥", "🤡", "💩", "👻", "👽", "👾",
            "❤️", "🔥", "👍", "👎", "🙌", "👏", "🙏", "💪", "👊", "✊",
            "✅", "⚠️", "❌", "🚫", "💯", "💢", "💎", "💰", "💡", "🔔"
        ];

        const checkNotificationStatus = () => {
            const btn = document.getElementById('notif-btn');
            if (!("Notification" in window) || Notification.permission === "granted") {
                btn.classList.add('hidden');
            } else {
                btn.classList.remove('hidden');
            }
        };

        window.requestNotificationPermission = () => {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("Em Pauta", { body: "Notificações ativadas!" });
                        checkNotificationStatus();
                    }
                });
            }
        };

        const triggerAlerts = (sender, text) => {
            if (!document.getElementById('panic-screen').classList.contains('hidden')) return;
            notificationSound.play().catch(() => {});
            if (document.hidden && !alertInterval) {
                alertInterval = setInterval(() => {
                    document.title = document.title === originalTitle ? "🔴 NOVA MENSAGEM!" : originalTitle;
                }, 1000);
            }
            if (document.hidden && Notification.permission === "granted") {
                const n = new Notification("Em Pauta", { body: `${sender}: ${text}`, icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png" });
                n.onclick = () => { window.focus(); n.close(); };
            }
        };

        window.addEventListener('focus', () => {
            if (alertInterval) { clearInterval(alertInterval); alertInterval = null; document.title = originalTitle; }
        });

        window.handleFileSelect = (input) => {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 800000) { alert("Arquivo muito grande (máx 800KB)"); return; }
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedFileBase64 = e.target.result;
                selectedFileType = file.type.startsWith('image') ? 'image' : 'audio';
                document.getElementById('file-name').innerText = file.name;
                document.getElementById('file-icon').className = selectedFileType === 'image' ? 'fas fa-image' : 'fas fa-microphone';
                document.getElementById('file-preview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.clearFileSelection = () => {
            selectedFileBase64 = null; selectedFileType = null;
            document.getElementById('file-input').value = "";
            document.getElementById('file-preview').classList.add('hidden');
        };

        window.toggleMsgMenu = (id) => {
            const menu = document.getElementById(`menu-${id}`);
            const isHidden = menu.classList.contains('hidden');
            document.querySelectorAll('.msg-dropdown').forEach(m => m.classList.add('hidden'));
            if (isHidden) menu.classList.remove('hidden');
            event.stopPropagation();
        };

        window.copyMsg = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
        };

        window.startReply = (id) => {
            const m = allMessages.find(msg => msg.id === id);
            replyTarget = { sender: m.sender, text: m.text || "[Mídia]" };
            document.getElementById('reply-preview-text').innerText = `${m.sender}: ${replyTarget.text}`;
            document.getElementById('reply-bar').classList.remove('hidden');
            document.getElementById('msg-input').focus();
        };

        window.addReaction = async (msgId, emoji) => {
            const msgRef = doc(db, 'artifacts', appIdSlug, 'public', 'data', 'messages', msgId);
            const msg = allMessages.find(m => m.id === msgId);
            const reactions = msg.reactions || {};
            reactions[emoji] = (reactions[emoji] || 0) + 1;
            await updateDoc(msgRef, { reactions: reactions });
        };

        window.editMsg = async (id, currentText) => {
            const newText = prompt("Editar mensagem:", currentText);
            if (newText && newText !== currentText) {
                await updateDoc(doc(db, 'artifacts', appIdSlug, 'public', 'data', 'messages', id), { text: newText + " (editada)" });
            }
        };

        window.deleteMsg = async (id) => {
            if (confirm("Apagar mensagem para todos?")) {
                await deleteDoc(doc(db, 'artifacts', appIdSlug, 'public', 'data', 'messages', id));
            }
        };

        window.togglePanicMode = () => {
            const panic = document.getElementById('panic-screen');
            if (panic.classList.contains('hidden')) {
                panic.classList.remove('hidden'); document.querySelector('.notepad-content').focus();
            } else {
                if (prompt("Senha para restaurar:") === MASTER_PASS) panic.classList.add('hidden');
            }
        };

        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('empauta_theme', isDark ? 'dark' : 'light');
            document.getElementById('dark-btn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            document.getElementById('app-header').style.backgroundColor = isDark ? '#202c33' : '#075e54';
        };

        window.toggleSearch = () => {
            const bar = document.getElementById('search-bar');
            bar.classList.toggle('hidden');
            if(!bar.classList.contains('hidden')) document.getElementById('search-input').focus();
        };

        window.insertEmoji = (e) => { document.getElementById('msg-input').value += e; document.getElementById('msg-input').focus(); };
        window.toggleEmojis = () => {
            const box = document.getElementById('emoji-box');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                box.innerHTML = emojiList.map(e => `<button onclick="insertEmoji('${e}')" class="text-2xl p-2 hover:scale-110 transition">${e}</button>`).join('');
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && myNick) startChatSession();
        });

        signInAnonymously(auth);

        window.attemptLogin = () => {
            const pass = document.getElementById('pass-input').value;
            const nick = document.getElementById('nick-input').value.trim();
            if (pass === MASTER_PASS && nick) {
                myNick = nick; localStorage.setItem('empauta_nick_vfinal', nick);
                window.requestNotificationPermission(); startChatSession();
            } else { alert("Acesso negado."); }
        };

        const startChatSession = () => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-app').classList.remove('hidden');
            document.getElementById('display-nick').innerText = myNick;
            checkNotificationStatus();
            startListening();
        };

        const startListening = () => {
            const colRef = collection(db, 'artifacts', appIdSlug, 'public', 'data', 'messages');
            onSnapshot(colRef, (snap) => {
                const list = [];
                snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                const oldLen = allMessages.length;
                allMessages = list.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                if (allMessages.length > oldLen && oldLen > 0) {
                    const last = allMessages[allMessages.length - 1];
                    if (last.sender !== myNick) triggerAlerts(last.sender, last.text || "[Arquivo]");
                }
                render();
            });
        };

        window.render = () => {
            const box = document.getElementById('chat-box');
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            box.innerHTML = "";
            const visible = allMessages.slice(filterIndex).filter(m => (m.text || "").toLowerCase().includes(searchVal) || m.sender.toLowerCase().includes(searchVal));
            
            visible.forEach(m => {
                const isMe = m.sender === myNick;
                const div = document.createElement('div');
                div.className = `bubble group ${isMe ? 'my-msg' : 'other-msg'}`;
                
                // Determina alinhamento do menu baseado no lado da mensagem
                const menuClass = isMe ? 'menu-right' : 'menu-left';

                let menuBtn = `
                    <button onclick="toggleMsgMenu('${m.id}')" class="msg-menu-btn">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div id="menu-${m.id}" class="msg-dropdown hidden ${menuClass}">
                        <div class="react-tray">
                            <span onclick="addReaction('${m.id}', '❤️')">❤️</span>
                            <span onclick="addReaction('${m.id}', '👍')">👍</span>
                            <span onclick="addReaction('${m.id}', '🔥')">🔥</span>
                            <span onclick="addReaction('${m.id}', '😂')">😂</span>
                        </div>
                        <button onclick="startReply('${m.id}')"><i class="fas fa-reply fa-xs"></i> Responder</button>
                        <button onclick="copyMsg('${m.text}')"><i class="fas fa-copy fa-xs"></i> Copiar</button>
                        ${isMe ? `
                            <button onclick="editMsg('${m.id}', '${m.text}')" class="text-blue-500"><i class="fas fa-edit fa-xs"></i> Editar</button>
                            <button onclick="deleteMsg('${m.id}')" class="text-red-500"><i class="fas fa-trash fa-xs"></i> Excluir</button>
                        ` : ''}
                    </div>
                `;

                let reactionsHtml = "";
                if (m.reactions && Object.keys(m.reactions).length > 0) {
                    reactionsHtml = `<div class="reactions-container">` + 
                        Object.entries(m.reactions).map(([emoji, count]) => `<div class="reaction-badge">${emoji} ${count}</div>`).join('') + 
                    `</div>`;
                }

                let replyHtml = m.reply ? `<span class="reply-tag">${m.reply}</span>` : "";
                let mediaHtml = m.fileType === 'image' ? `<img src="${m.fileData}" class="msg-image" onclick="window.open(this.src)" />` : (m.fileType === 'audio' ? `<audio controls class="msg-audio"><source src="${m.fileData}" type="audio/mpeg"></audio>` : "");
                
                div.innerHTML = `
                    ${menuBtn}
                    <div class="text-[9px] font-bold text-teal-800 dark:text-teal-400 uppercase mb-1 opacity-70 pr-4">${m.sender}</div>
                    ${replyHtml}${mediaHtml}
                    <div class="text-sm text-gray-800 dark:text-gray-200 break-words whitespace-pre-wrap leading-tight">${m.text || ""}</div>
                    ${reactionsHtml}
                    <div class="text-[8px] text-gray-400 text-right mt-1">${m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...'}</div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        };

        window.doSendMessage = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim() && !selectedFileBase64 || !currentUser) return;
            const payload = {
                sender: myNick, text: input.value.trim(),
                reply: replyTarget ? `${replyTarget.sender}: ${replyTarget.text}` : null,
                fileData: selectedFileBase64, fileType: selectedFileType,
                timestamp: serverTimestamp(), uid: currentUser.uid, reactions: {}
            };
            try { 
                await addDoc(collection(db, 'artifacts', appIdSlug, 'public', 'data', 'messages'), payload); 
                input.value = ""; window.cancelReply(); window.clearFileSelection();
            } catch (e) {}
        };

        window.logout = () => { localStorage.removeItem('empauta_nick_vfinal'); location.reload(); };
        window.clearScreen = () => { filterIndex = allMessages.length; render(); };
        window.cancelReply = () => { replyTarget = null; document.getElementById('reply-bar').classList.add('hidden'); };
        
        window.onclick = () => document.querySelectorAll('.msg-dropdown').forEach(m => m.classList.add('hidden'));

        document.getElementById('msg-input').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        document.getElementById('msg-input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.doSendMessage(); } });
        if(localStorage.getItem('empauta_theme') === 'dark') toggleDarkMode();
    </script>
</body>
</html>
